<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; }
        .form-control { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .form-control:focus { background: rgba(255,255,255,0.15); color: white; border-color: #6c63ff; box-shadow: 0 0 0 0.2rem rgba(108,99,255,0.25); }
        .form-control::placeholder { color: rgba(255,255,255,0.4); }
        .login-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; }
    </style>
</head>
<body class="text-white d-flex align-items-center justify-content-center" style="min-height:100vh">
    <div style="width:100%;max-width:420px;padding:20px">

        <div class="text-center mb-4">
            <div style="font-size:3rem">🔐</div>
            <h2 class="fw-bold mt-2">Connexion</h2>
            <p class="text-white-50 small">Toutes les tentatives sont enregistrées</p>
        </div>

        <div class="login-card p-4">
            {% if erreur %}
            <div class="alert alert-danger">⚠️ {{ erreur }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="mb-3">
                    <label class="form-label text-white-50 small">NOM D'UTILISATEUR</label>
                    <input type="text" name="username" class="form-control" placeholder="Identifiant" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-white-50 small">MOT DE PASSE</label>
                    <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Se connecter →</button>
            </form>
        </div>

        <div class="text-center mt-3">
            <a href="/" class="text-white-50 small">← Retour à l'accueil</a>
        </div>

        <div class="mt-3 p-3 rounded-3" style="background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.2)">
            <p class="small text-white-50 mb-1">🧪 Comptes de test :</p>
            <p class="small mb-0"><code>admin</code> / <code>admin123</code></p>
            <p class="small mb-0"><code>alice</code> / <code>alice456</code></p>
        </div>
    </div>
</body>
</html>
