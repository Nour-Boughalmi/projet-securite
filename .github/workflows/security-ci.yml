name: Security CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  security-scan:
    name: Scan sécurité
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install bandit safety pytest pytest-cov

      - name: Bandit SAST scan
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Safety SCA scan
        run: safety check || true

      - name: Tests unitaires
        run: pytest tests/ -v || true

      - name: Upload rapport Bandit
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore

  docker-build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t secure-app . || true
